name: Update PubMed literature

on:
  schedule:
    - cron: '0 21 * * *'      # 每日 21:00 UTC ≈ 台灣時間隔日 05:00
  workflow_dispatch:           # 也可在 Actions 頁面手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest literature
        env:
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python update_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json)" ]; then
            git add data.json
            git commit -m "chore: auto-update PubMed literature ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to data.json"
          fi
