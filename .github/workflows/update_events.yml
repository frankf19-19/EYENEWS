name: Update Events Calendar
on:
  schedule:
    - cron: '30 22 * * *'   # 每日一次(UTC 22:30 ≈ 台灣 06:30)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests beautifulsoup4
      - name: Scrape calendar
        run: python update_events.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "auto: update events calendar"
          git push
