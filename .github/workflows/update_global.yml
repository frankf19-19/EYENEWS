name: Update global news

on:
  schedule:
    - cron: '30 22 * * *'      # 每日 22:30 UTC ≈ 台灣隔日 06:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-commit
  cancel-in-progress: false

jobs:
  global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch global eye-vision news (+key points)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 選填;不設則用免費翻譯
        run: python update_global.py
      - name: Commit global_news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain global_news.json)" ]; then echo "No changes"; exit 0; fi
          git add global_news.json
          git commit -m "chore: auto-update global news ($(date -u +%Y-%m-%d))"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push retry $i…"; sleep 5
          done
          echo "push failed after retries"; exit 1
