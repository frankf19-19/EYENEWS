name: Update Eye Clinics
on:
  schedule:
    - cron: '0 23 * * 1'   # 每週一 UTC 23:00(健保資料每日更新,每週抓一次足夠)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Scrape clinics
        run: python update_clinics.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add clinics.json
          git diff --staged --quiet || git commit -m "auto: update eye clinics"
          git push
